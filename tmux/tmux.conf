# prefix setting
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Press r to reload tmux configuration.
bind r source-file ~/.config/tmux/tmux.conf \; display "Tmux Reloaded!"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Theme
set -g @plugin 'rose-pine/tmux'
set -g @rose_pine_variant 'moon' # Options are 'main', 'moon' or 'dawn'

# Auto rename pane name
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Set mouse on for scrolling
set -g mouse on

# Vi mode
set-window-option -g mode-keys vi

# vi-style key bindings in the status line
set -g status-keys vi

# Vi like copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Copy to system clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# Fast cursor movement in copy mode (5 steps, like nvim)
bind-key -T copy-mode-vi H send-keys -X -N 5 cursor-left
bind-key -T copy-mode-vi J send-keys -X -N 5 cursor-down
bind-key -T copy-mode-vi K send-keys -X -N 5 cursor-up
bind-key -T copy-mode-vi L send-keys -X -N 5 cursor-right

# Jump to top/bottom of visible screen in copy mode (replaces default H/L)
bind-key -T copy-mode-vi U send-keys -X top-line
bind-key -T copy-mode-vi D send-keys -X bottom-line

# Resize pane with prefix + hjkl
bind h resize-pane -L 10
bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 10

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'
